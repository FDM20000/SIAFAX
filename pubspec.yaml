name: siafax_mobiler
description: Aplicativo MobileR do SIAFAX
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0
  path_provider: ^2.1.2
  geolocator: ^10.0.0
  camera: ^0.10.5+5
  share_plus: ^7.2.0
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/Logo_Preto.jpg"
